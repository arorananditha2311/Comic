<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Soul, Two Hearts - Chapters</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #fff0f5);
    }
    .comic-title {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      color: #ff4d94;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    .chapter-card:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-pink-200 shadow-md py-4 px-8 flex justify-between items-center sticky top-0 z-50">
    <h1 class="comic-title text-2xl">One Soul, Two Hearts</h1>
    <ul class="flex space-x-6 font-semibold">
      <li><a href="index.html#home" class="hover:text-pink-600">Home</a></li>
      <li><a href="index.html#comics" class="hover:text-pink-600">Comics</a></li>
      <li><a href="index.html#about" class="hover:text-pink-600">About</a></li>
    </ul>
  </nav>

  <!-- Search Bar -->
  <section class="py-8 text-center">
    <input 
      type="text" 
      id="chapterSearch" 
      placeholder="Search Chapters..." 
      class="w-full sm:w-80 p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-300"
      onkeyup="filterChapters()"
    >
  </section>

  <!-- Chapters List -->
  <section class="py-8">
    <div class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto px-4" id="chaptersGrid">

      <!-- Chapter 1 -->
      <div class="chapter-card bg-white rounded-2xl shadow-lg overflow-hidden p-6 transition-transform duration-300">
        <h3 class="comic-title text-2xl mb-2">Chapter 1: Destiny Begins</h3>
        <a href="https://drive.google.com/file/d/1OqmG5zRnVbHmfgS1Pc2s3zObKGnF9ans/view?usp=drive_link"><p class="text-gray-600">The first meeting of two hearts, setting the stage for a magical love story.</p></a>
      </div>

      <!-- Chapter 2 -->
      <!-- <div class="chapter-card bg-white rounded-2xl shadow-lg overflow-hidden p-6 transition-transform duration-300">
        <h3 class="comic-title text-2xl mb-2">Chapter 2: Unexpected Moments</h3>
        <p class="text-gray-600">Destiny continues to play its role as hearts connect through unexpected events.</p>
      </div> -->

      <!-- Add more chapters here -->

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-pink-200 py-8 text-center text-gray-700 mt-auto">
    &copy; 2025 Love Comic Hub | All rights reserved
  </footer>

  <script>
  function filterChapters() {
    const input = document.getElementById('chapterSearch').value.toLowerCase();
    const chapters = document.querySelectorAll('.chapter-card');
    
    chapters.forEach(chapter => {
      const title = chapter.querySelector('h3').innerText.toLowerCase();
      if(title.includes(input)) {
        chapter.style.display = '';
      } else {
        chapter.style.display = 'none';
      }
    });
  }
  </script>

</body>
</html>
